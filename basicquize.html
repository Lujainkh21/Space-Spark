<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
   <!-- <link rel="stylesheet" href="quizbasic.css">   --> 


    <style>

      body {
   background: linear-gradient(#0b1a3a, #1e2a5a);
  color: white;
  text-align: center;
  font-family: Arial;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 40px;
 
  
}

.card {
  width: 120px;
  height: 150px;
  background: linear-gradient(#1e3a8a, #312e81);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 25px;
  box-shadow: 0 0 15px #6366f1;
  margin-top: 100px;
  margin-right: 30px;
}



.numbers {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 40px;
}

.num {
  width: 80px;
  height: 80px;
  background: #7c3aed;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 30px;
  margin-top: 150px;
}

.selected {
  border: 3px solid yellow;
}

button{
  margin-top: 30px;
}

#im1 {
  width: 100px;
  height: 130px;
}

#message{
  margin-top: 15px;
  font-size: 20px;
  font-weight: bold;
  color: #ff4d4d;
  text-align: center;
}

.logo h2 {
  margin: 0;
  font-size: 28px;
}

.logo p {
  margin: 0;
  font-size: 14px;
  opacity: 0.8;
}

.topbar {
  display: flex;
  justify-content: flex-start; /* يخليه يسار */
  align-items: center;
  padding: 20px 40px;
}

    </style>
    
</head>
<body>
    
  <header class="topbar">
  <div class="logo">
    <h2>SpaceSpark</h2>
    <p>Learn • Explore • Grow</p>
  </div>

 
</header>

    <div class="game1" class="page active">

  <!-- الأوراق -->
  <div class="cards">

    <div class="card" data-value="3">
      <img src="3p.png" alt="" width="300" height="300">
    </div>

    <div class="card" data-value="5">
     <img src="5p.png" alt="" width="300" height="300">
    </div>

    <div class="card" data-value="2">
      <img src="2p.png" alt="" width="300" height="300">
    </div>

    <div class="card" data-value="4">
      <img src="4p.png" alt=""width="280" height="280">
    </div>

    <div class="card" data-value="1">
      <img src="1p.png" alt="" width="280" height="280">
    </div>

  </div>

  <!-- الأرقام -->
  <div class="numbers">
    <div class="num" data-value="1">1</div>
    <div class="num" data-value="2">2</div>
    <div class="num" data-value="3">3</div>
    <div class="num" data-value="4">4</div>
    <div class="num" data-value="5">5</div>
  </div>

  <p id="message"></p>
</div>

</div>
<a href="BasicLevel.html">
  <button >⬅️ Back</button>
  </a>
  <a href="basicquiz1.html">
  <button >Next ➡️</button>
  </a>
</div>



<script>

  // الرقم المختار
let selectedNumber = null;

// اختيار الرقم
document.querySelectorAll(".num").forEach(num => {
  num.addEventListener("click", () => {

    // نشيل التحديد من الكل
    document.querySelectorAll(".num").forEach(n => n.classList.remove("selected"));

    // نحدد الرقم الحالي
    num.classList.add("selected");

    // نخزن الرقم
    selectedNumber = num.dataset.value;
  });
});


// اختيار الكرت
document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("click", () => {

    const msg = document.getElementById("message");

    // إذا ما اختار رقم
    if (!selectedNumber) {
      msg.innerText = "Choose a number first ";
      msg.style.color = "orange";

      setTimeout(() => {
        msg.innerText = "";
      }, 2000);

      return;
    }

    // إذا الإجابة صح
    if (selectedNumber == card.dataset.value) {
      // تشغيل صوت الصح
      let correctSound = new Audio("correct.MP4");
      correctSound.play();
      card.innerHTML = "✔️";
      card.style.background = "green";
      

      msg.innerText = "Great job! ⭐";
      msg.style.color = "#00ff99";

      setTimeout(() => {
        msg.innerText = "";
      }, 2000);

    } else {
      // تشغيل صوت الغلط
      let wrongSound = new Audio("tryagain.MP4");
      wrongSound.play();  
      // إذا غلط
      msg.innerText = "Try Again";
      msg.style.color = "red";

      setTimeout(() => {
        msg.innerText = "";
      }, 2000);
    }

  });
});

</script>

</body>
</html>
