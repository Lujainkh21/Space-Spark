<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Numbers Planet - Basic Level</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>

<h1>🪐 Basic Level</h1>

<!-- الصفحة الأولى -->
<div id="page1" class="page active">

  <div class="grid">
    <div class="card">
      <img src="1.png">
      <p>One</p>
      <button onclick="playSound('sounds/1.mp3')">🔊</button>
    </div>

    <div class="card">
      <img src="2.png">
      <p>Two</p>
      <button onclick="playSound('sounds/2.mp3')">🔊</button>
    </div>

    <div class="card">
      <img src="3.png">
      <p>Three</p>
      <button onclick="playSound('sounds/3.mp3')">🔊</button>
    </div>

    <div class="card">
      <img src="4.png">
      <p>Four</p>
      <button onclick="playSound('sounds/4.mp3')">🔊</button>
    </div>

    <div class="card">
      <img src="5.png">
      <p>Five</p>
      <button onclick="playSound('sounds/5.mp3')">🔊</button>
    </div>
  </div>

  <button onclick="nextPage()">Next ➡️</button>
</div>


<!-- الصفحة الثانية -->
<div id="page2" class="page">

    <div class="card">

    </div>

    <div class="card">
      <img src="images/10.png">
      <p>Ten</p>
      <button onclick="playSound('sounds/10.mp3')">🔊</button>
    </div>
  </div>

  <button onclick="prevPage()">⬅️ Back</button>
</div>

<script src="script.js"></script>
</body>
</html>
